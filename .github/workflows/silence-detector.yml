name: silence-detector

# Issue #99 — every 15 min, hit /api/alerts and post a comment to the
# perma-tracking issue when any provider exceeds its severity-tiered
# silence threshold. The endpoint itself does the tiering (see
# backend/services/silence_detector.py); this workflow just decides
# whether to alert.
#
# Severity tiers (provider age threshold):
#   critical: yfinance / EIA / audit_log     >  1h
#   warning : cftc / alpaca_paper / news /
#             ofac                            >  4h
#   info    : aisstream / hormuz / iran_* /
#             russia                          > 24h
#
# Critical alerts comment on the tracking issue every cycle. Warning
# and info alerts are reported on the run summary only — comment
# spam on slow-moving providers is worse than the warning.

on:
  schedule:
    - cron: "*/15 * * * *"
  workflow_dispatch:

concurrency:
  group: silence-detector
  cancel-in-progress: true

permissions:
  contents: read
  issues: write

jobs:
  check:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Hit /api/alerts
        id: probe
        run: |
          set -eu
          URL="https://oil-tracker-api-canadaeast-0f18.azurewebsites.net/api/alerts"
          out=$(curl -fsS --max-time 30 "$URL" || echo '{"alert_count":-1,"highest_severity":"unreachable","alerts":[]}')
          echo "$out" > alerts.json
          cat alerts.json
          alert_count=$(jq -r '.alert_count' alerts.json)
          highest=$(jq -r '.highest_severity' alerts.json)
          echo "alert_count=$alert_count" >> "$GITHUB_OUTPUT"
          echo "highest=$highest" >> "$GITHUB_OUTPUT"
          {
            echo "## Silence detector — $(date -u '+%Y-%m-%d %H:%M UTC')"
            echo
            echo "- alert_count: $alert_count"
            echo "- highest_severity: $highest"
            echo
            echo '```json'
            jq -r '.alerts[] | "- [\(.severity)] \(.provider): \(.message)"' alerts.json || true
            echo '```'
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Comment on tracking issue (critical only)
        if: steps.probe.outputs.highest == 'critical'
        uses: actions/github-script@v9
        with:
          script: |
            const fs = require('fs');
            const payload = JSON.parse(fs.readFileSync('alerts.json', 'utf8'));
            const lines = (payload.alerts || []).map(
              a => `- **${a.severity}** \`${a.provider}\` — stale ${a.age_hours}h (threshold ${a.threshold_hours}h)`
            );
            const body = [
              `### Silence detector — ${new Date().toISOString()}`,
              ``,
              `**${payload.alert_count} alert(s)** — highest severity: \`${payload.highest_severity}\``,
              ``,
              ...lines,
              ``,
              `_Auto-generated by \`.github/workflows/silence-detector.yml\`._`,
            ].join('\n');

            // Look for a tracking issue with a stable title — create if missing.
            const title = 'silence-detector: provider freshness alerts';
            const existing = await github.rest.issues.listForRepo({
              owner: context.repo.owner, repo: context.repo.repo,
              state: 'open', labels: 'monitor', per_page: 100,
            });
            let tracking = existing.data.find(i => i.title === title);
            if (!tracking) {
              const created = await github.rest.issues.create({
                owner: context.repo.owner, repo: context.repo.repo,
                title, body: 'Tracking issue for the silence-detector watchdog (#99). Comments below are auto-posted on every critical alert. Close when noise is intolerable; the workflow re-creates on next critical hit.',
                labels: ['monitor'],
              });
              tracking = created.data;
            }
            await github.rest.issues.createComment({
              owner: context.repo.owner, repo: context.repo.repo,
              issue_number: tracking.number,
              body,
            });
