name: Release

on:
  push:
    tags:
      - "v*.*.*"
  workflow_dispatch:
    inputs:
      tag:
        description: "Tag to release (e.g. v1.0.0)"
        required: true

permissions:
  contents: write  # needs write to create the release

concurrency:
  group: release-prod
  cancel-in-progress: false

jobs:
  release:
    name: Tag-driven release
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout (with full history)
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Compute tag
        id: tag
        run: |
          set -eu
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "tag=${{ github.event.inputs.tag }}" >> "$GITHUB_OUTPUT"
          else
            echo "tag=${GITHUB_REF#refs/tags/}" >> "$GITHUB_OUTPUT"
          fi

      - name: Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install + test gate
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          python -m pytest tests/unit -x -q

      - name: Compose release notes from PROGRESS.md diff
        id: notes
        shell: bash
        run: |
          set -eu
          TAG="${{ steps.tag.outputs.tag }}"
          prev=$(git tag --sort=-v:refname | grep -v "^${TAG}$" | head -n 1 || true)
          {
            echo "## ${TAG}"
            echo ""
            if [ -n "${prev}" ]; then
              echo "Changes since ${prev}:"
              echo ""
              echo "### Commits"
              echo '```'
              git log --pretty=format:"- %s (%h)" "${prev}..${TAG}" | head -50 || true
              echo ""
              echo '```'
              echo ""
              echo "### PROGRESS.md diff"
              echo '```diff'
              git diff "${prev}..${TAG}" -- PROGRESS.md | head -200 || true
              echo '```'
            else
              echo "First release."
              echo ""
              echo '```'
              git log --pretty=format:"- %s (%h)" | head -50
              echo '```'
            fi
          } > /tmp/release-notes.md

          cat /tmp/release-notes.md

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -eu
          TAG="${{ steps.tag.outputs.tag }}"
          gh release create "$TAG" \
            --title "$TAG" \
            --notes-file /tmp/release-notes.md
