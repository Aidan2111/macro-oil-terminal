          echo "Uncomment deploy steps after: az webapp create ..."

      - name: Azure logout
        if: always()
        run: az logout || true

  frontend-deploy:
    name: Frontend — Deploy Next.js to Azure Static Web Apps
    runs-on: ubuntu-latest
    timeout-minutes: 20
    environment:
      name: production-frontend

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js ${{ env.NODE_VERSION }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend dependencies
        working-directory: frontend
        run: npm ci

      - name: Test gate — next build
        working-directory: frontend
        run: npm run build

      - name: Stamp build-info.txt for live-verify
        run: |
          mkdir -p frontend/public
          SHA_SHORT=$(git rev-parse --short HEAD)
          BUILD_TIME=$(date -u +%Y-%m-%dT%H:%M:%SZ)
          cat > frontend/public/build-info.txt <<EOF
          sha=${{ github.sha }}
          sha_short=${SHA_SHORT}
          time=${BUILD_TIME}
          region=eastus2
          workflow_run=${{ github.run_id }}
          EOF
          cat frontend/public/build-info.txt

