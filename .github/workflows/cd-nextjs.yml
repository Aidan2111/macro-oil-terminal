name: CD (Next.js + FastAPI)

# Parallel to .github/workflows/cd.yml. That pipeline keeps shipping
# the Streamlit app to oil-tracker-app-canadaeast-4474 on every main
# push; this one only fires when the new-stack paths change.
#
# NOTE: the backend App Service and the Static Web App are NOT
# provisioned yet. The `AZURE_BACKEND_APP_NAME` env var below is a
# placeholder — uncomment the deploy step once Aidan has run:
#   az webapp create --name oil-tracker-api-canadaeast-NNNN \
#                    --resource-group oil-price-tracker \
#                    --plan <plan-name> --runtime "PYTHON|3.11"
#   az staticwebapp create --name oil-tracker-web-NNNN \
#                          --resource-group oil-price-tracker \
#                          --location eastus2 --sku Free
# and once AZURE_STATIC_WEB_APPS_API_TOKEN is stored as a repo
# secret.

on:
  push:
    branches: [main]
    paths:
      - "backend/**"
      - "frontend/**"
      - ".github/workflows/cd-nextjs.yml"
      - "static-web-apps/**"
  workflow_dispatch:

concurrency:
  group: deploy-prod-nextjs
  cancel-in-progress: false

permissions:
  id-token: write
  contents: read

env:
  AZURE_BACKEND_APP_NAME: oil-tracker-api-canadaeast-0f18
  AZURE_RG_NAME: oil-price-tracker
  PYTHON_VERSION: "3.11"
  NODE_VERSION: "20"

jobs:
  backend-deploy:
    name: Backend — Deploy FastAPI to Azure App Service
    runs-on: ubuntu-latest
    timeout-minutes: 20
    environment:
      name: production-backend
      url: https://${{ env.AZURE_BACKEND_APP_NAME }}.azurewebsites.net

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python ${{ env.PYTHON_VERSION }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip

      - name: Install backend dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r backend/requirements.txt

      - name: Test gate — pytest backend/tests -q
        run: pytest backend/tests -q

      - name: Azure login (OIDC)
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Stamp build-info
        id: stamp
        run: |
          mkdir -p backend/static
          SHA_SHORT=$(git rev-parse --short HEAD)
          BUILD_TIME=$(date -u +%Y-%m-%dT%H:%M:%SZ)
          cat > backend/static/build-info.json <<EOF
          {"sha": "${{ github.sha }}", "sha_short": "${SHA_SHORT}", "time": "${BUILD_TIME}", "region": "canadaeast", "workflow_run": "${{ github.run_id }}"}
          EOF
          cat backend/static/build-info.json
          echo "sha_short=${SHA_SHORT}" >> $GITHUB_OUTPUT
          echo "build_time=${BUILD_TIME}" >> $GITHUB_OUTPUT

      - name: Package backend (zip)
        run: |
          mkdir -p dist
          cd backend
          zip -rq ../dist/backend.zip . \
            -x "tests/*" \
            -x "__pycache__/*" \
            -x "*.pyc"
          cd ..
          ls -la dist/

