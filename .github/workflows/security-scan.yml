name: Security scan

# Wave 4 hardening — review #14 §5 ("CI integration recommendations").
# Runs the same tooling the review's audit pass used (bandit, pip-audit,
# npm audit) on every PR + push to main + weekly cron + manual trigger.
#
# Baselines (recorded at audit time, 2026-04-25):
#   * bandit -ll -ii backend/ providers/   -> 0 findings
#   * pip-audit (backend + root reqs)      -> 0 vulns
#   * npm audit --audit-level=high frontend/ -> 0 vulns (6 moderate dev-only)
# Any High+ regression fails the job. See SECURITY.md for the rotation policy.

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]
  schedule:
    - cron: "0 5 * * 1"  # Mondays 05:00 UTC
  workflow_dispatch:

permissions:
  contents: read
  security-events: write

concurrency:
  group: security-scan-${{ github.ref }}
  cancel-in-progress: true

jobs:
  python-security:
    name: bandit + pip-audit (Python)
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install scanners
        run: |
          python -m pip install --upgrade pip
          pip install bandit pip-audit

      # Audit baseline (2026-04-25): 0 findings at -ll -ii. Any
      # medium+ severity / medium+ confidence finding fails the job.
      - name: bandit (medium+ severity, medium+ confidence)
        run: bandit -r backend/ providers/ -ll -ii

      # Audit baseline: 0 vulns across both requirement sets. Any new
      # advisory fails the job.
      - name: pip-audit (backend + root requirements)
        run: |
          pip-audit -r backend/requirements.txt -r requirements.txt --strict

  node-security:
    name: npm audit (frontend)
    runs-on: ubuntu-latest
    timeout-minutes: 8
    defaults:
      run:
        working-directory: frontend
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend deps
        run: npm ci --legacy-peer-deps

      # Audit baseline: 0 high/critical advisories. The 6 moderate
      # dev-only findings (vitest/vite/postcss) are tracked in
      # SECURITY.md and do not block this gate.
      - name: npm audit (high+ only)
        run: npm audit --audit-level=high
