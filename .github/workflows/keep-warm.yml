name: keep-warm

# Pings every public service every 10 min in waking hours so the
# FastAPI App Service container stays hot. The Static Web App is
# CDN-fronted and doesn't need warming — pinged here as a 200-check.
#
# History: this workflow used to ping the decommissioned westus2
# Streamlit URL (oil-tracker-app-4281) which started failing once
# the React cutover landed. Updated 2026-04-25 to hit the canonical
# canadaeast backend + SWA root. The Streamlit canadaeast ping was
# removed on 2026-04-26 alongside the wider Streamlit teardown — the
# 48h-stable rollback window closed at 2026-04-27 04:00 UTC.

on:
  schedule:
    # Every 10 minutes during waking hours (07:00-22:00 UTC)
    - cron: "*/10 7-22 * * *"
    # Every 30 minutes overnight (23:00-06:00 UTC) — saves free-tier CPU
    - cron: "*/30 23,0-6 * * *"
  workflow_dispatch:

concurrency:
  group: keep-warm
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  ping:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Warm FastAPI backend (canadaeast — /health gate)
        run: |
          set -eu
          URL="https://oil-tracker-api-canadaeast-0f18.azurewebsites.net/health"
          for attempt in 1 2 3 4 5; do
            if curl -fsS --max-time 30 "$URL"; then
              echo "  backend warm on attempt $attempt"
              exit 0
            fi
            echo "  attempt $attempt failed, retrying..."
            sleep 15
          done
          echo "Backend cold after 5 attempts (canadaeast)" >&2
          exit 1

      - name: Warm heavy data endpoints (force lazy imports resident)
        # /health alone doesn't touch the big lazy imports — pandas /
        # numpy / yfinance / statsmodels / arch / sklearn only load when
        # a real data route is hit. Without this step, the first user
        # request to /api/spread or /api/inventory after a quiet period
        # ate 3–21s of cold-import time. We hit each endpoint once per
        # cron tick to keep the imports + provider clients resident.
        #
        # Deliberately NOT pinging /api/thesis/generate (the SSE path)
        # because every call burns Azure OpenAI tokens. /api/thesis/latest
        # is a cached read against the audit log — safe to probe.
        run: |
          set -eu
          BASE="https://oil-tracker-api-canadaeast-0f18.azurewebsites.net"
          # /api/spread first (loads pandas + yfinance) so the rest of
          # the heavy endpoints reuse the warmed module cache.
          for ep in /api/spread /api/inventory /api/cftc /api/positions/account /api/thesis/latest /api/data-quality; do
            code_time=$(curl -sS -o /dev/null -w '%{http_code} %{time_total}s' --max-time 60 "$BASE$ep" || echo 'curl-failed -')
            echo "  $ep -> $code_time"
          done

      - name: Ping React Static Web App (non-fatal)
        run: |
          set -eu
          URL="https://delightful-pebble-00d8eb30f.7.azurestaticapps.net/build-info.txt"
          if curl -fsS --max-time 20 "$URL"; then
            echo "  SWA build-info reachable"
          else
            echo "SWA build-info unreachable (non-fatal)" >&2
          fi
