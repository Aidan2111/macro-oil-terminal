name: synthetic-thesis-monitor

# Issue #100 — every 15 min, exercise the write path end-to-end:
#   1. POST to /api/thesis/generate which IS the SSE stream
#      (returns text/event-stream, not a JSON envelope with a
#      `stream_url` — that was the assumption #129 caught).
#   2. Capture the `data:` line that follows the `event: done`
#      marker; that's the terminal payload to validate.
#   3. POST the run summary to /api/synthetic/record so the API
#      keeps the 24h ring buffer + consecutive-failure counter.
#   4. Page on 3 consecutive failures (the OpenAI-503 tolerance
#      band).

on:
  schedule:
    - cron: "*/15 * * * *"
  workflow_dispatch:

concurrency:
  group: synthetic-thesis-monitor
  cancel-in-progress: true

permissions:
  contents: read
  issues: write

jobs:
  probe:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Checkout repo (for the standalone validator script)
        uses: actions/checkout@v4

      - name: Generate thesis (SSE) and validate
        id: probe
        run: |
          set -euo pipefail
          BASE="https://oil-tracker-api-canadaeast-0f18.azurewebsites.net"
          STARTED=$(date -u +"%Y-%m-%dT%H:%M:%S+00:00")
          T0=$(date +%s)

          # `/api/thesis/generate` is the SSE stream itself — POST
          # returns a text/event-stream body. We give it 100s
          # (>90s SLA, <120s App Service idle). On timeout / HTTP
          # error the file is empty; downstream parsing handles
          # that path.
          tmp=$(mktemp)
          curl -sS --max-time 110 \
               -X POST \
               -H 'Content-Type: application/json' \
               -H 'Accept: text/event-stream' \
               -H 'Cache-Control: no-cache' \
               -d '{"mode":"fast","portfolio_usd":250000}' \
               "$BASE/api/thesis/generate" \
               > "$tmp" 2>/tmp/curl-stderr.log || true

          T1=$(date +%s)
          DURATION=$((T1 - T0))
          FINISHED=$(date -u +"%Y-%m-%dT%H:%M:%S+00:00")

          echo "DURATION=${DURATION}s" >> "$GITHUB_STEP_SUMMARY"
          echo "BYTES=$(wc -c < "$tmp")" >> "$GITHUB_STEP_SUMMARY"
          if [ -s /tmp/curl-stderr.log ]; then
            echo '```' >> "$GITHUB_STEP_SUMMARY"
            cat /tmp/curl-stderr.log >> "$GITHUB_STEP_SUMMARY"
            echo '```' >> "$GITHUB_STEP_SUMMARY"
          fi

          # Extract the LAST `data: {…}` line whose preceding
          # marker was `event: done`. Reset the capture flag on any
          # other event so we don't accidentally pair a delta payload
          # with a stale done-flag.
          done_payload=$(awk '
            /^event: done/      { capture=1; next }
            /^event:/           { capture=0; next }
            /^data: / && capture { print substr($0, 7); capture=0 }
          ' "$tmp" | tail -1)

          ok=true
          violations='[]'
          stance="null"
          conviction="null"

          if [ -z "$done_payload" ]; then
            ok=false
            violations='["no done event in SSE stream (timeout / 5xx / non-SSE response)"]'
            echo "no done payload — first 200 chars of body:" >> "$GITHUB_STEP_SUMMARY"
            head -c 200 "$tmp" >> "$GITHUB_STEP_SUMMARY" || true
          else
            # Use the checked-in standalone validator (stdlib only)
            # so we don't fight YAML heredoc indentation. Mirrors
            # backend.services.synthetic_monitor.validate_done_event.
            validation=$(python3 scripts/synthetic_validate_done.py "$done_payload" "$DURATION")
            ok=$(echo "$validation" | jq -r '.ok')
            violations=$(echo "$validation" | jq -c '.violations')
            stance=$(echo "$validation" | jq -c '.stance')
            conviction=$(echo "$validation" | jq -c '.conviction')
          fi

          # POST the run back to /api/synthetic/record. Wrap with `set +e`
          # so a failed record call doesn't hide the upstream verdict.
          payload=$(jq -nc \
            --arg started_at "$STARTED" \
            --arg finished_at "$FINISHED" \
            --argjson duration_s "$DURATION" \
            --argjson ok "$ok" \
            --argjson violations "$violations" \
            --argjson stance "$stance" \
            --argjson conviction "$conviction" \
            '{started_at: $started_at, finished_at: $finished_at,
              duration_s: $duration_s, ok: $ok,
              violations: $violations, stance: $stance,
              conviction: $conviction}')

          record=$(curl -sS --max-time 15 -X POST -H 'Content-Type: application/json' \
                       -d "$payload" "$BASE/api/synthetic/record" 2>/dev/null \
                   || echo '{"consecutive_failures":-1}')
          # Defensively coerce to an integer; if record came back as
          # non-JSON (old #129 mode) we still emit -1 and the page
          # step skips.
          consecutive=$(echo "$record" | jq -r 'try .consecutive_failures // -1' 2>/dev/null || echo '-1')

          echo "consecutive=$consecutive" >> "$GITHUB_OUTPUT"
          echo "ok=$ok" >> "$GITHUB_OUTPUT"
          {
            echo
            echo "## Synthetic thesis monitor — $FINISHED"
            echo
            echo "- duration_s: $DURATION"
            echo "- ok: $ok"
            echo "- consecutive_failures: $consecutive"
            echo "- violations: $violations"
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Page on 3 consecutive failures
        if: steps.probe.outputs.consecutive >= '3'
        uses: actions/github-script@v7
        with:
          script: |
            const consecutive = '${{ steps.probe.outputs.consecutive }}';
            const body = [
              `### Synthetic thesis monitor — ${consecutive} consecutive failures`,
              ``,
              `The /api/thesis/generate write path has failed validation`,
              `${consecutive} cron cycles in a row (≥45 min). Investigate:`,
              `- Foundry SSE: streaming health, latency, model errors`,
              `- App Service idle timeouts on the SSE keepalive`,
              `- audit-log writes (the #75/#76 regression was here)`,
              ``,
              `Run history: see Actions tab + \`/api/synthetic/last-24h\`.`,
              ``,
              `_Auto-generated by \`.github/workflows/synthetic-thesis-monitor.yml\`._`,
            ].join('\n');
            const title = 'synthetic-thesis-monitor: write path failure';
            const existing = await github.rest.issues.listForRepo({
              owner: context.repo.owner, repo: context.repo.repo,
              state: 'open', labels: 'monitor', per_page: 100,
            });
            let tracking = existing.data.find(i => i.title === title);
            if (!tracking) {
              const created = await github.rest.issues.create({
                owner: context.repo.owner, repo: context.repo.repo,
                title, body: 'Tracking issue for the synthetic-thesis monitor (#100). Comments below auto-post when the write path fails ≥3 cycles in a row.',
                labels: ['monitor'],
              });
              tracking = created.data;
            }
            await github.rest.issues.createComment({
              owner: context.repo.owner, repo: context.repo.repo,
              issue_number: tracking.number,
              body,
            });
