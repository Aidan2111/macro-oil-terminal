name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  tests:
    name: test_runner.py
    runs-on: ubuntu-latest
    timeout-minutes: 15
    strategy:
      matrix:
        python-version: ["3.11", "3.12"]
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run test_runner.py
        run: python test_runner.py

      - name: Streamlit import smoke check
        run: |
          python -c "import streamlit, pandas, numpy, plotly, sklearn, yfinance; print('ok')"
          python -c "import app" 2>&1 | tail -5 || true

  streamlit-smoke:
    name: Streamlit startup smoke test
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Boot app, hit /_stcore/health
        run: |
          python -m streamlit run app.py \
            --server.headless=true \
            --server.port=8501 \
            --server.address=127.0.0.1 \
            --browser.gatherUsageStats=false &
          SPID=$!
          for i in {1..30}; do
            if curl -fsS http://127.0.0.1:8501/_stcore/health > /dev/null; then
              echo "Streamlit is healthy"
              break
            fi
            sleep 1
          done
          curl -fsS http://127.0.0.1:8501/_stcore/health
          curl -s -o /dev/null -w "Root: %{http_code}\n" http://127.0.0.1:8501/
          kill $SPID || true
