name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  pytest:
    name: pytest (unit + coverage)
    runs-on: ubuntu-latest
    timeout-minutes: 15
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12"]
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run pytest + coverage
        run: |
          python -m pytest tests/unit \
            --cov \
            --cov-report=term \
            --cov-report=xml:coverage.xml

      - name: Upload coverage XML (3.11 only)
        if: matrix.python-version == '3.11'
        uses: actions/upload-artifact@v4
        with:
          name: coverage-xml
          path: coverage.xml
          if-no-files-found: ignore

  streamlit-smoke:
    name: Streamlit startup smoke
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Boot app, hit /_stcore/health
        run: |
          python -m streamlit run app.py \
            --server.headless=true \
            --server.port=8501 \
            --server.address=127.0.0.1 \
            --browser.gatherUsageStats=false &
          SPID=$!
          for i in {1..30}; do
            if curl -fsS http://127.0.0.1:8501/_stcore/health > /dev/null; then
              echo "Streamlit is healthy"
              break
            fi
            sleep 1
          done
          curl -fsS http://127.0.0.1:8501/_stcore/health
          curl -s -o /dev/null -w "Root: %{http_code}\n" http://127.0.0.1:8501/
          kill $SPID || true

  legacy-runner:
    # Keep test_runner.py around as a belt-and-braces smoke suite so we
    # catch regressions even before pytest collects them.
    name: Legacy test_runner.py
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
      - run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          python test_runner.py
