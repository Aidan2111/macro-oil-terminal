name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  pytest:
    name: pytest (unit + coverage)
    runs-on: ubuntu-latest
    timeout-minutes: 15
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12"]
    steps:
      - uses: actions/checkout@v6

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run pytest + coverage
        run: |
          # tests/unit is the bulk of the suite; tests/regression
          # contains the issue-#104 LLM regression corpus and runs on
          # every PR under the deterministic stub predictor (no LLM
          # cost). Drift on a corpus scenario fails the build.
          python -m pytest tests/unit tests/regression \
            --cov \
            --cov-report=term \
            --cov-report=xml:coverage.xml

      - name: Upload coverage XML (3.11 only)
        if: matrix.python-version == '3.11'
        uses: actions/upload-artifact@v7
        with:
          name: coverage-xml
          path: coverage.xml
          if-no-files-found: ignore
