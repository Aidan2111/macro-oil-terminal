name: E2E (Playwright)

# Issue #132 — Playwright e2e suite gating every PR. Frontend dev
# server is started in webServer config; all /api/** calls are
# intercepted by tests/e2e/_fixtures.ts so the suite is hermetic
# (no live FastAPI / OpenAI tokens / yfinance hits).

on:
  push:
    branches: [main]
    paths:
      - "frontend/**"
      - ".github/workflows/e2e-playwright.yml"
  pull_request:
    branches: [main]
    paths:
      - "frontend/**"
      - ".github/workflows/e2e-playwright.yml"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: e2e-playwright-${{ github.ref }}
  cancel-in-progress: true

jobs:
  e2e:
    name: e2e (chromium + mobile)
    runs-on: ubuntu-latest
    timeout-minutes: 15
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json

      - name: Install JS deps
        run: npm ci --prefer-offline --no-audit

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      - name: Run Playwright tests
        env:
          CI: "true"
        run: npm run test:e2e -- --project=chromium --project=mobile-chromium

      - name: Upload Playwright HTML report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: frontend/playwright-report/
          retention-days: 7
          if-no-files-found: ignore

      - name: Upload trace + screenshots
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-traces
          path: frontend/test-results/
          retention-days: 7
          if-no-files-found: ignore
